<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    h2 {
    text-decoration: line-through;
    text-transform: uppercase;
    }
    
    h3 {
    text-decoration: underline overline;
    text-transform: lowercase;
    }
    
    h4 {
    text-decoration: underline overline;
    text-transform: none;
    }
</style>
</head>
<body>
    <h2>codingal</h2>
    <h3>codingal</h3>
    <h4>codingal</h4>
</body>
</html>
